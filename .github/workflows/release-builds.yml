name: Build Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            script: pack:ci:win
            artifact: debuggle-windows
            path: |
              release/*.exe
              release/*.msi
              release/*portable*.exe
              release/*.blockmap
              release/latest*.yml
          - name: linux
            os: ubuntu-latest
            script: pack:ci:linux
            artifact: debuggle-linux
            path: |
              release/*.AppImage
              release/*.deb
              release/*.rpm
              release/*.flatpak
              release/*.blockmap
              release/latest*.yml
          - name: macos-unsigned
            os: macos-latest
            script: pack:ci:mac
            artifact: debuggle-macos-unsigned
            path: |
              release/*.dmg
              release/*.zip
              release/*.blockmap
              release/latest*.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Linux packaging deps
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm flatpak flatpak-builder
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install -y flathub org.freedesktop.Platform//23.08 org.freedesktop.Sdk//23.08

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build artifacts
        run: pnpm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: ${{ matrix.path }}

